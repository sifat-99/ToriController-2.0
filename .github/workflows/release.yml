name: Build and Release ToriController

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and Package Electron App
        run: npm run dist
        env:
          # Disable automatic code signing search to build unsigned DMG/EXE successfully
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ToriController-${{ matrix.os }}
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize release files
        run: |
          mkdir release-files
          # Find and copy all exe and dmg files to release-files directory
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" \) -exec cp {} release-files/ \;
          ls -R release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
